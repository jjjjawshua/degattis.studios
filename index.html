<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>degattis studios</title>
<link rel="icon" type="image/svg+xml" href="svgs/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Courier Prime', 'Courier New', monospace; }

  /* ── Splash ── */
  #splash {
    position: fixed; inset: 0; background: #0a0a0a;
    display: flex; align-items: center; justify-content: center;
    z-index: 100; overflow: hidden; cursor: pointer;
  }
  #splash::after {
    content: ''; position: absolute; inset: -50%; width: 200%; height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 128px 128px;
    opacity: 0.35; pointer-events: none; animation: grain 0.8s steps(2) infinite;
  }
  @keyframes grain {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(-3%,4%); }
    50%  { transform: translate(3%,-2%); }
    75%  { transform: translate(-4%,-3%); }
    100% { transform: translate(2%,3%); }
  }
  .splash-text {
    text-align: center; color: #d4a017; line-height: 1.8;
    position: relative; z-index: 2; pointer-events: none;
  }
  .splash-text .en, .splash-text .vn { font-size: 15px; letter-spacing: 0.04em; }

  /* ── Home ── */
  #home {
    position: fixed; inset: 0; background: #faf9f6; z-index: 200;
    clip-path: circle(0% at 50% 50%);
    transition: clip-path 2s cubic-bezier(0.76, 0, 0.24, 1);
    overflow-y: auto; pointer-events: none;
    display: flex; flex-direction: column; min-height: 100%;
  }
  #home.revealed { clip-path: circle(150% at var(--cx) var(--cy)); pointer-events: auto; }

  /* ── Ticker ── */
  @keyframes ticker-run { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }
  #ticker-strip { height: 28px; overflow: hidden; position: relative; background: inherit; }
  #ticker-track { display: flex; align-items: center; height: 100%; white-space: nowrap; position: absolute; left: 0; top: 0; }
  #ticker-track.running { animation: ticker-run 60s linear infinite; }
  .ticker-text { font-size: 13px; letter-spacing: 0.12em; color: #555; padding: 0 120px 0 0; }
  .ticker-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #5a8c6f; margin: 0 32px; vertical-align: middle; position: relative; top: -1px; }

  /* ── Header ── */
  #site-header { position: sticky; top: 0; background: #faf9f6; z-index: 10; padding-top: env(safe-area-inset-top); }
  .header-bar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 52px; }
  .wordmark { font-size: 18px; font-weight: normal; letter-spacing: 0.01em; white-space: nowrap; text-decoration: none; color: inherit; min-height: 44px; display: inline-flex; align-items: center; }
  .wordmark:hover { opacity: 0.6; }
  .cart-btn { background: none; border: none; font-family: 'Courier Prime', 'Courier New', monospace; font-size: 13px; letter-spacing: 0.04em; cursor: pointer; padding: 0; color: inherit; min-height: 44px; min-width: 44px; display: inline-flex; align-items: center; justify-content: flex-end; }

  /* ── Page body ── */
  .page-body { flex: 1; padding: 40px 20px; }

  /* ── Product grid ── */
  .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
  .product-card { position: relative; background: transparent; overflow: hidden; cursor: pointer; }
  .product-card img { width: 100%; aspect-ratio: 3/4; object-fit: contain; padding: 24px 24px 12px; display: block; transition: transform 0.4s ease; mix-blend-mode: multiply; }
  .product-card:hover img { transform: scale(1.03); }
  .product-info { display: flex; justify-content: space-between; align-items: flex-end; padding: 16px 20px 18px; }
  .product-meta { display: flex; flex-direction: column; gap: 4px; }
  .product-name { font-size: 11px; letter-spacing: 0.08em; color: #111; }
  .product-price { font-size: 11px; letter-spacing: 0.06em; color: #555; }
  .add-btn { background: none; border: none; font-family: 'Courier Prime', 'Courier New', monospace; font-size: 18px; color: #111; cursor: pointer; padding: 0; line-height: 1; transition: opacity 0.2s; min-height: 44px; min-width: 44px; display: inline-flex; align-items: center; justify-content: center; }
  .add-btn:hover { opacity: 0.5; }

  /* ── Footer ── */
  #site-footer { border-top: 1px solid #000; padding: 32px 20px 24px; font-size: 11px; letter-spacing: 0.06em; }
  .footer-top { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .footer-left { display: flex; flex-direction: column; gap: 10px; }
  .footer-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .footer-links-row { display: flex; flex-wrap: wrap; gap: 28px; }
  .footer-links-row a, .footer-left a { color: inherit; text-decoration: none; transition: opacity 0.2s; min-height: 44px; display: inline-flex; align-items: center; }
  .footer-links-row a:hover, .footer-left a:hover { opacity: 0.5; }
  .footer-signup { color: #aaa; font-size: 11px; letter-spacing: 0.06em; }
  .footer-bottom { display: flex; justify-content: space-between; align-items: center; }
  .footer-copy { font-size: 10px; letter-spacing: 0.06em; color: #999; }
  .footer-signup-row { display: flex; align-items: center; gap: 10px; }
  .footer-signup-btn { background: none; border: 1px solid currentColor; font-family: 'Courier Prime', 'Courier New', monospace; font-size: 10px; letter-spacing: 0.08em; padding: 4px 10px; cursor: pointer; color: #888; transition: color 0.2s; min-height: 44px; display: inline-flex; align-items: center; }
  .footer-signup-btn:hover { color: #111; }

  /* ── Focus ── */
  a:focus-visible, button:focus-visible { outline: 2px solid #5a8c6f; outline-offset: 2px; }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    .product-grid { grid-template-columns: repeat(2, 1fr); }
    .ticker-text { font-size: 14px; }
  }
  @media (max-width: 480px) {
    .product-grid { grid-template-columns: repeat(1, 1fr); }
  }
  @media (max-width: 600px) {
    .footer-top { flex-direction: column; gap: 16px; }
    .footer-right { align-items: flex-start; }
    .footer-bottom { flex-direction: column; align-items: flex-start; gap: 12px; }
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    #ticker-track.running { animation-play-state: paused; }
  }
</style>
</head>
<body>

  <div id="splash" tabindex="0">
    <div class="splash-text">
      <div class="en">click anywhere to enter</div>
      <div class="vn">nhấp vào bất cứ đâu để vào</div>
    </div>
  </div>

  <div id="home">
    <div id="site-header">
      <div id="ticker-strip" aria-hidden="true" aria-live="off"><div id="ticker-track"></div></div>
      <div class="header-bar">
        <a class="wordmark" href="index.html#enter">degattis studios</a>
        <button class="cart-btn" aria-label="shopping cart, 0 items">cart (0)</button>
      </div>
    </div>
    <div class="page-body">
      <div class="product-grid">
        <div class="product-card">
          <img src="images/DSG-Signature-Hat.png" alt="DSG-001 signature olive green snapback hat">
          <div class="product-info">
            <div class="product-meta">
              <span class="product-name">dsg-001-signature</span>
              <span class="product-price">$50</span>
            </div>
            <button class="add-btn" aria-label="add dsg-001-signature to cart">+</button>
          </div>
        </div>
        <div class="product-card">
          <img src="images/dsg-002-skateboard.jpg" alt="DSG-002 skateboard deck">
          <div class="product-info">
            <div class="product-meta">
              <span class="product-name">dsg-002-skateboard</span>
              <span class="product-price">$100</span>
            </div>
            <button class="add-btn" aria-label="add dsg-002-skateboard to cart">+</button>
          </div>
        </div>
        <div class="product-card">
          <img src="images/dsg-003-clock.jpg" alt="DSG-003 wall clock">
          <div class="product-info">
            <div class="product-meta">
              <span class="product-name">dsg-003-clock</span>
              <span class="product-price">$80</span>
            </div>
            <button class="add-btn" aria-label="add dsg-003-clock to cart">+</button>
          </div>
        </div>
        <div class="product-card">
          <img src="images/dsg-004-keychain.jpg" alt="DSG-004 keychain">
          <div class="product-info">
            <div class="product-meta">
              <span class="product-name">dsg-004-keychain</span>
              <span class="product-price">$40</span>
            </div>
            <button class="add-btn" aria-label="add dsg-004-keychain to cart">+</button>
          </div>
        </div>
      </div>
    </div>
    <div id="site-footer">
      <div class="footer-top">
        <div class="footer-left">
          <nav aria-label="site links">
            <div class="footer-links-row">
              <a href="about.html">about</a>
              <a href="archive.html">archive</a>
              <a href="privacy.html">privacy</a>
              <a href="terms.html">terms</a>
            </div>
          </nav>
        </div>
        <div class="footer-right">
          <nav aria-label="social links">
            <div class="footer-links-row">
              <a href="https://instagram.com/degattis.studios" target="_blank">instagram</a>
              <a href="https://open.spotify.com/user/t0dnhmkxgbecywv91l7grxz3y" target="_blank">spotify</a>
              <a href="contact.html">contact</a>
            </div>
          </nav>
        </div>
      </div>
      <div class="footer-bottom">
        <span class="footer-copy">© 2026 degattis studios. all rights reserved.</span>
        <div class="footer-signup-row">
          <span class="footer-signup">sign up for updates</span>
          <button class="footer-signup-btn">→</button>
        </div>
      </div>
    </div>
  </div>

<script>
  const splash = document.getElementById('splash');
  const home   = document.getElementById('home');

  // ── Infrared cursor ──
  const heatCanvas = document.createElement('canvas');
  heatCanvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;';
  splash.appendChild(heatCanvas);
  const hctx = heatCanvas.getContext('2d');
  function resizeHeat() { heatCanvas.width = window.innerWidth; heatCanvas.height = window.innerHeight; }
  resizeHeat();
  window.addEventListener('resize', resizeHeat);
  let hx = -500, hy = -500;
  splash.addEventListener('mousemove', (e) => { hx = e.clientX; hy = e.clientY; });
  (function drawHeat() {
    requestAnimationFrame(drawHeat);
    hctx.fillStyle = 'rgba(0,0,0,0.07)';
    hctx.fillRect(0, 0, heatCanvas.width, heatCanvas.height);
    const g = hctx.createRadialGradient(hx, hy, 0, hx, hy, 55);
    g.addColorStop(0,    'rgba(255,255,210,0.35)');
    g.addColorStop(0.15, 'rgba(255,140,0,0.22)');
    g.addColorStop(0.40, 'rgba(180,20,0,0.14)');
    g.addColorStop(0.70, 'rgba(60,0,15,0.07)');
    g.addColorStop(1,    'rgba(0,0,0,0)');
    hctx.fillStyle = g;
    hctx.beginPath();
    hctx.arc(hx, hy, 55, 0, Math.PI * 2);
    hctx.fill();
  })();

  // ── Reveal ──
  function enterHome(instant) {
    if (instant) {
      home.style.transition = 'none';
      home.style.setProperty('--cx', '50%');
      home.style.setProperty('--cy', '50%');
      home.classList.add('revealed');
      splash.style.display = 'none';
    }
  }
  // skip splash if same session (refresh) or coming from a sub-page
  if (sessionStorage.getItem('dgs-entered') || location.hash === '#enter') {
    history.replaceState(null, '', location.pathname);
    enterHome(true);
  }

  function triggerReveal(cx, cy) {
    sessionStorage.setItem('dgs-entered', '1');
    home.style.setProperty('--cx', cx);
    home.style.setProperty('--cy', cy);
    home.classList.add('revealed');
    splash.style.pointerEvents = 'none';
  }

  splash.addEventListener('click', function(e) {
    const x = (e.clientX / window.innerWidth  * 100).toFixed(1) + '%';
    const y = (e.clientY / window.innerHeight * 100).toFixed(1) + '%';
    triggerReveal(x, y);
  });

  splash.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      triggerReveal('50%', '50%');
    }
  });

  // ── Ticker ──
  function fmt(tz) {
    return new Date().toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: tz }).toLowerCase().replace(' ', '');
  }
  const TICKER_DURATION = 40;
  function startTicker() {
    const track = document.getElementById('ticker-track');
    track.innerHTML = `<span class="ticker-text"><span class="ticker-dot"></span>new york, ny — ${fmt('America/New_York')}<span class="ticker-dot"></span>dallas, tx — ${fmt('America/Chicago')}<span class="ticker-dot"></span>ho chi minh city, vn — ${fmt('Asia/Ho_Chi_Minh')}<span class="ticker-dot"></span></span>`;
    track.classList.add('running');
  }
  startTicker();
</script>
</body>
</html>
